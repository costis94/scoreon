<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="scannerPageTitle"></title>
  <link rel="stylesheet" href="scanner.css" />
</head>
<body>
  <header class="topbar">
    <div class="brandHeader">
      <img src="../assets/icons/icon128.png" alt="Scoreon logo" />
      <div>
        <h1 data-i18n="appName"></h1>
        <p data-i18n="scannerTagline"></p>
      </div>
    </div>
    <div class="status" id="status" data-i18n="statusReady"></div>
  </header>

  <main class="layout">
    <section class="panel previewPanel">
      <div class="panelHeader">
        <h2 data-i18n="previewCropTitle"></h2>
        <button id="startCaptureBtn" class="primary" data-i18n="startCapture"></button>
      </div>

      <div class="videoShell" id="videoShell">
        <video id="previewVideo" autoplay muted playsinline></video>
        <canvas id="selectionCanvas"></canvas>
        <div class="emptyHint" id="emptyHint" data-i18n="emptyHintHtml"></div>
      </div>

      <div class="actions">
        <button id="clearCropBtn" data-i18n="clearCrop"></button>
        <span id="cropInfo" data-i18n="cropNone"></span>
      </div>
    </section>

    <aside class="panel controlsPanel">
      <h2 data-i18n="scanSettingsTitle"></h2>

      <div class="subsection titleSection">
        <h3 data-i18n="scoreTitleSection"></h3>
        <label>
          <span data-i18n="pdfTitleLabel"></span>
          <input id="scoreTitleInput" type="text" data-i18n-placeholder="scoreTitlePlaceholder" placeholder="" />
        </label>
        <button id="useCapturedTitleBtn" type="button" class="smallButton" data-i18n="useCapturedTitle"></button>
        <div id="sourceTitleHint" class="tinyHint" data-i18n="sourceTitleHintNone"></div>
      </div>

      <label>
        <span data-i18n="frameInterval"></span>
        <input id="intervalInput" type="number" min="150" max="5000" step="50" value="500" />
      </label>

      <label>
        <span data-i18n="changeThreshold"></span>
        <input id="thresholdInput" type="number" min="1" max="80" step="1" value="12" />
      </label>

      <label>
        <span data-i18n="duplicateThreshold"></span>
        <input id="duplicateThresholdInput" type="number" min="0" max="40" step="1" value="5" />
      </label>

      <label>
        <span data-i18n="minGap"></span>
        <input id="minGapInput" type="number" min="0" max="10000" step="100" value="900" />
      </label>

      <label>
        <span data-i18n="maxImageWidth"></span>
        <input id="maxImageWidthInput" type="number" min="600" max="2400" step="100" value="1600" />
      </label>

      <div class="subsection">
        <h3 data-i18n="scoreDetectorSection"></h3>
        <label class="checkboxLine">
          <input id="scoreDetectorInput" type="checkbox" checked />
          <span data-i18n="scoreDetectorOnly"></span>
        </label>

        <label>
          <span data-i18n="minScoreConfidence"></span>
          <input id="minScoreInput" type="number" min="0" max="100" step="1" value="48" />
        </label>
      </div>

      <label class="checkboxLine">
        <input id="enhanceInput" type="checkbox" checked />
        <span data-i18n="enhanceImage"></span>
      </label>

      <div class="subsection">
        <h3 data-i18n="exportCleanupSection"></h3>
        <label class="checkboxLine">
          <input id="autoTrimInput" type="checkbox" checked />
          <span data-i18n="autoTrim"></span>
        </label>

        <label>
          <span data-i18n="trimPadding"></span>
          <input id="trimPaddingInput" type="number" min="0" max="80" step="2" value="18" />
        </label>
      </div>

      <label>
        <span data-i18n="pdfOrientation"></span>
        <select id="pdfLayoutInput">
          <option value="portrait" selected data-i18n="pdfPortrait"></option>
          <option value="landscape" data-i18n="pdfLandscape"></option>
        </select>
      </label>

      <label>
        <span data-i18n="pdfMode"></span>
        <select id="pdfModeInput">
          <option value="compact" selected data-i18n="pdfModeCompact"></option>
          <option value="single" data-i18n="pdfModeSingle"></option>
        </select>
      </label>

      <div class="buttonGrid">
        <button id="startScanBtn" class="primary" data-i18n="startScan"></button>
        <button id="stopScanBtn" disabled data-i18n="stopScan"></button>
      </div>

      <button id="exportPdfBtn" disabled data-i18n="exportPdf"></button>
      <button id="exportPngZipBtn" disabled data-i18n="exportPngZip"></button>
      <button id="exportOmrPackageBtn" disabled data-i18n="exportOmrPackage"></button>
      <button id="clearFramesBtn" class="danger" disabled data-i18n="clearFrames"></button>

      <div class="metrics">
        <div><b id="framesCount">0</b><span data-i18n="savedFrames"></span></div>
        <div><b id="lastDiff">-</b><span data-i18n="lastDiff"></span></div>
        <div><b id="lastScore">-</b><span data-i18n="scoreDetectorMetric"></span></div>
        <div><b id="rejectedCount">0</b><span data-i18n="rejectedFrames"></span></div>
      </div>
    </aside>

    <section class="panel framesPanel">
      <div class="panelHeader">
        <h2 data-i18n="savedSnippetsTitle"></h2>
        <span class="small" data-i18n="savedSnippetsHint"></span>
      </div>
      <div id="framesList" class="framesList"></div>
    </section>
  </main>

  <canvas id="workCanvas" hidden></canvas>
  <canvas id="compareCanvas" hidden></canvas>
  <canvas id="detectorCanvas" hidden></canvas>

  <script src="i18n.js"></script>
  <script src="scanner.js"></script>
</body>
</html>
