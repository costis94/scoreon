<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="popupTitle"></title>
  <style>
    body {
      width: 320px;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #08111f;
      color: #f9fafb;
    }

    .wrap { padding: 16px; }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .brand img { width: 38px; height: 38px; border-radius: 10px; }
    h1 { font-size: 18px; margin: 0; }
    p { font-size: 13px; line-height: 1.35; color: #d1d5db; margin: 0 0 14px; }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      font-weight: 700;
      cursor: pointer;
      background: #C22636;
      color: #eff6ff;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="../assets/icons/icon128.png" alt="Scoreon logo" />
      <h1 data-i18n="popupTitle"></h1>
    </div>
    <p data-i18n="popupDescription"></p>
    <button id="openScanner" data-i18n="popupOpenScanner"></button>
    
  </div>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
